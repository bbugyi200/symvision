name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Set up Python
        run: uv python install 3.12
      - name: Build package
        run: uv build
      - name: Validate package metadata
        run: uvx --from twine twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  install-smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install the wheel in a fresh environment
        run: |
          uv venv --python 3.12 /tmp/symvision-smoke
          uv pip install --python /tmp/symvision-smoke/bin/python dist/*.whl
      - name: Exercise the installed CLI
        run: |
          set -euo pipefail

          /tmp/symvision-smoke/bin/symvision --help
          fixture="$(mktemp -d)"
          mkdir -p "${fixture}/ok/pkg" "${fixture}/violation/pkg"
          printf 'def exported():\n    return 1\n' > "${fixture}/ok/pkg/api.py"
          printf 'from pkg.api import exported\n\nexported()\n' > "${fixture}/ok/app.py"
          printf 'def orphan():\n    return 1\n' > "${fixture}/violation/pkg/api.py"

          /tmp/symvision-smoke/bin/symvision "${fixture}/ok" \
            > /tmp/symvision-ok.out 2> /tmp/symvision-ok.err
          grep -Fq "All public/private classes/functions are used properly!" \
            /tmp/symvision-ok.out

          status=0
          /tmp/symvision-smoke/bin/symvision "${fixture}/violation" \
            > /tmp/symvision-violation.out 2> /tmp/symvision-violation.err || status=$?
          test "${status}" -eq 1
          grep -Fq "orphan" /tmp/symvision-violation.out

  publish:
    needs: [release, build, install-smoke]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
